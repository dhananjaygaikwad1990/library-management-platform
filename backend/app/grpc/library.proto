syntax = "proto3";

package liberary;

import "google/protobuf/empty.proto";

message AuthorRecord {
  int32 author_id = 1;
  string first_name = 2;
  string last_name = 3;
  string biography = 4;
}

message BookRecord {
  int32 book_id = 1;
  int32 author_id = 2;
  string isbn = 3;
  string title = 4;
  string category = 5;
  string publisher = 6;
  int32 publish_year = 7;
  string language = 8;
  int32 pages = 9;
}

message BookCopyRecord {
  int32 copy_id = 1;
  int32 book_id = 2;
  string barcode = 3;
  string shelf_location = 4;
  string status = 5;
}

message MemberRecord {
  int32 member_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string address = 6;
  string membership_date = 7;
  string status = 8;
}

message BorrowRecordMessage {
  int32 borrow_id = 1;
  int32 copy_id = 2;
  int32 member_id = 3;
  string borrow_date = 4;
  string due_date = 5;
  string return_date = 6;
  double fine_amount = 7;
  string remarks = 8;
}

message AuthorRequest {
  string first_name = 1;
  string last_name = 2;
  string biography = 3;
}

message AuthorResponse {
  AuthorRecord author = 1;
}

message BookRequest {
  int32 author_id = 1;
  string isbn = 2;
  string title = 3;
  string category = 4;
  string publisher = 5;
  int32 publish_year = 6;
  string language = 7;
  int32 pages = 8;
}

message BookResponse {
  BookRecord book = 1;
}

message BookListResponse {
  repeated BookRecord books = 1;
}

message BookCopyRequest {
  int32 book_id = 1;
  string barcode = 2;
  string shelf_location = 3;
  string status = 4;
}

message BookCopyResponse {
  BookCopyRecord book_copy = 1;
}

message MemberRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
  string membership_date = 6;
}

message MemberResponse {
  MemberRecord member = 1;
}

message BorrowRequest {
  int32 copy_id = 1;
  int32 member_id = 2;
  string borrow_date = 3;
  string due_date = 4;
  string remarks = 5;
}

message BorrowResponse {
  BorrowRecordMessage borrow = 1;
}

message BookIdRequest {
  int32 book_id = 1;
}

service LibraryService {
  rpc CreateAuthor (AuthorRequest) returns (AuthorResponse);
  rpc CreateBook (BookRequest) returns (BookResponse);
  rpc CreateBookCopy (BookCopyRequest) returns (BookCopyResponse);
  rpc CreateMember (MemberRequest) returns (MemberResponse);
  rpc BorrowCopy (BorrowRequest) returns (BorrowResponse);
  rpc ListBooks (google.protobuf.Empty) returns (BookListResponse);
  rpc GetBook (BookIdRequest) returns (BookResponse);
}
